version: 2

# Grouped, security-forward dependency updates.
#   version updates  -> ONE grouped PR per ecosystem, weekly, after a cooldown
#                       so brand-new (possibly broken) releases settle first.
#   security updates -> ONE grouped PR per ecosystem, applied promptly --
#                       cooldown never delays security fixes.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      dependencies:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
